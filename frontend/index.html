<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fantasy Baseball Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            color: #764ba2;
            margin-bottom: 16px;
            font-size: 1.5rem;
            border-bottom: 2px solid #667eea;
            padding-bottom: 8px;
        }

        .search-box {
            width: 100%;
            padding: 10px;
            border: 2px solid #667eea;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 1rem;
        }

        .player-list {
            list-style: none;
            max-height: 300px;
            overflow-y: auto;
        }

        .player-item {
            padding: 12px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-item:hover {
            background: #f8f9fa;
        }

        .player-name {
            font-weight: 600;
            color: #333;
        }

        .player-info {
            font-size: 0.85rem;
            color: #666;
        }

        .player-stats {
            text-align: right;
            font-size: 0.85rem;
        }

        .stat-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            margin-left: 4px;
        }

        .loading {
            text-align: center;
            color: #666;
            padding: 20px;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 16px;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #764ba2;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .empty-state {
            color: #999;
            font-style: italic;
            text-align: center;
            padding: 20px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .stat-box {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #666;
        }

        .stat-value {
            font-size: 1.25rem;
            font-weight: bold;
            color: #764ba2;
        }

        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px;
            border: 2px solid #667eea;
            border-radius: 8px;
            background: white;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }
            .grid {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚾ Fantasy Baseball Dashboard</h1>

        <div id="error-message"></div>

        <div class="grid">
            <!-- Players Card -->
            <div class="card" style="grid-column: 1 / -1;">
                <h2>👥 Players <span id="player-count" class="stat-badge">0</span></h2>
                
                <div class="filter-bar">
                    <input type="text" id="search-input" class="search-box" placeholder="Search players...">
                    <select id="position-filter" class="filter-select">
                        <option value="">All Positions</option>
                        <option value="C">C</option>
                        <option value="1B">1B</option>
                        <option value="2B">2B</option>
                        <option value="3B">3B</option>
                        <option value="SS">SS</option>
                        <option value="OF">OF</option>
                        <option value="SP">SP</option>
                        <option value="RP">RP</option>
                    </select>
                    <button class="btn" onclick="loadPlayers()">Refresh</button>
                </div>

                <div id="players-container">
                    <div class="loading">Loading players...</div>
                </div>
            </div>

            <!-- Stats Leaders -->
            <div class="card">
                <h2>🏆 Home Run Leaders</h2>
                <div id="hr-leaders">
                    <div class="loading">Loading...</div>
                </div>
            </div>

            <!-- Quick Stats -->
            <div class="card">
                <h2>📊 Quick Stats</h2>
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-label">Total Players</div>
                        <div id="total-players" class="stat-value">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Teams</div>
                        <div id="total-teams" class="stat-value">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">API Status</div>
                        <div id="api-status" class="stat-value">-</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-label">Last Updated</div>
                        <div id="last-updated" class="stat-value">-</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // API Configuration
        const API_BASE = 'http://localhost:8000/api';
        
        // State
        let allPlayers = [];
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            checkHealth();
            loadPlayers();
            loadLeaders();
            
            // Search debounce
            let debounceTimer;
            document.getElementById('search-input').addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => filterPlayers(), 300);
            });
            
            document.getElementById('position-filter').addEventListener('change', filterPlayers);
        });
        
        // Check API health
        async function checkHealth() {
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                document.getElementById('api-status').textContent = '✅';
                document.getElementById('api-status').style.color = '#28a745';
            } catch (error) {
                showError('Backend API not available. Is the server running on port 8000?');
                document.getElementById('api-status').textContent = '❌';
                document.getElementById('api-status').style.color = '#dc3545';
            }
        }
        
        // Load players
        async function loadPlayers() {
            const container = document.getElementById('players-container');
            container.innerHTML = '<div class="loading">Loading players...</div>';
            
            try {
                const response = await fetch(`${API_BASE}/players/?limit=50`);
                if (!response.ok) throw new Error('Failed to fetch players');
                
                allPlayers = await response.json();
                document.getElementById('player-count').textContent = allPlayers.length;
                document.getElementById('total-players').textContent = allPlayers.length;
                document.getElementById('last-updated').textContent = new Date().toLocaleTimeString();
                
                filterPlayers();
            } catch (error) {
                container.innerHTML = `<div class="error">Error loading players: ${error.message}</div>`;
            }
        }
        
        // Filter players
        function filterPlayers() {
            const search = document.getElementById('search-input').value.toLowerCase();
            const position = document.getElementById('position-filter').value;
            
            let filtered = allPlayers;
            
            if (search) {
                filtered = filtered.filter(p => 
                    p.name?.toLowerCase().includes(search) ||
                    p.team?.toLowerCase().includes(search)
                );
            }
            
            if (position) {
                filtered = filtered.filter(p => p.position === position);
            }
            
            renderPlayers(filtered);
        }
        
        // Render players list
        function renderPlayers(players) {
            const container = document.getElementById('players-container');
            
            if (players.length === 0) {
                container.innerHTML = '<div class="empty-state">No players found</div>';
                return;
            }
            
            container.innerHTML = `
                <ul class="player-list">
                    ${players.map(player => `
                        <li class="player-item">
                            <div>
                                <div class="player-name">${player.name || 'Unknown'}</div>
                                <div class="player-info">
                                    ${player.team || 'N/A'} • ${player.position || 'N/A'}
                                </div>
                            </div>
                            <div class="player-stats">
                                ${player.hr ? `<span class="stat-badge">${player.hr} HR</span>` : ''}
                                ${player.avg ? `<span class="stat-badge">${player.avg} AVG</span>` : ''}
                                ${player.ops ? `<span class="stat-badge">${player.ops} OPS</span>` : ''}
                            </div>
                        </li>
                    `).join('')}
                </ul>
            `;
        }
        
        // Load HR leaders
        async function loadLeaders() {
            const container = document.getElementById('hr-leaders');
            
            try {
                const response = await fetch(`${API_BASE}/players/stats/leaders?stat=hr&limit=5`);
                if (!response.ok) throw new Error('Failed to fetch leaders');
                
                const leaders = await response.json();
                
                if (leaders.length === 0) {
                    container.innerHTML = '<div class="empty-state">No data available</div>';
                    return;
                }
                
                container.innerHTML = `
                    <ul class="player-list">
                        ${leaders.map((player, index) => `
                            <li class="player-item">
                                <div>
                                    <span style="font-weight: bold; color: #764ba2; margin-right: 8px;">#${index + 1}</span>
                                    <span class="player-name">${player.name || 'Unknown'}</span>
                                </div>
                                <span class="stat-badge">${player.hr || 0} HR</span>
                            </li>
                        `).join('')}
                    </ul>
                `;
            } catch (error) {
                container.innerHTML = `<div class="error">Error: ${error.message}</div>`;
            }
        }
        
        // Show error message
        function showError(message) {
            document.getElementById('error-message').innerHTML = `
                <div class="error">${message}</div>
            `;
            setTimeout(() => {
                document.getElementById('error-message').innerHTML = '';
            }, 5000);
        }
    </script>
</body>
</html>
